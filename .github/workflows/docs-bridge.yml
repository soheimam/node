name: Sync Node Docs

on:
  push:
    branches:
      - "main"
    paths:
      - "geth/**"
      - "nethermind/**"
      - "versions.env"
      - ".env"
      - ".env.mainnet"
      - ".env.sepolia"
      - "docker-compose.yml"
      - "README.md"
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Optional base SHA for manual diff generation"
        required: false
      docs_repository:
        description: "Repository to update"
        required: false
        default: "soheimam/nodes-docs"
      docs_target_paths:
        description: "Optional comma-separated docs paths to force into the LLM context"
        required: false

permissions:
  contents: read

env:
  DOCS_REPOSITORY: ${{ inputs.docs_repository || 'soheimam/nodes-docs' }}
  LLM_MODEL: ${{ vars.DOCS_LLM_MODEL || vars.LLM_MODEL || 'claude-sonnet-4-6' }}

jobs:
  generate-docs-pr:
    name: Generate docs pull request
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout source repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: source
          fetch-depth: 0

      - name: Create docs repository token
        id: docs-token
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          DOCS_APP_ID: ${{ secrets.DOCS_APP_ID }}
          DOCS_APP_PRIVATE_KEY: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -n "${DOCS_REPO_TOKEN:-}" ]]; then
            echo "::add-mask::$DOCS_REPO_TOKEN"
            echo "token=$DOCS_REPO_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${DOCS_APP_ID:-}" || -z "${DOCS_APP_PRIVATE_KEY:-}" ]]; then
            echo "Configure either DOCS_REPO_TOKEN or DOCS_APP_ID and DOCS_APP_PRIVATE_KEY." >&2
            exit 1
          fi

          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          async function main() {
            const appId = process.env.DOCS_APP_ID;
            const privateKey = process.env.DOCS_APP_PRIVATE_KEY.replace(/\\n/g, "\n");
            const [owner, repo] = process.env.DOCS_REPOSITORY.split("/");
            const now = Math.floor(Date.now() / 1000);

            const encode = (value) => Buffer.from(JSON.stringify(value)).toString("base64url");
            const unsigned = `${encode({ alg: "RS256", typ: "JWT" })}.${encode({
              iat: now - 60,
              exp: now + 540,
              iss: appId,
            })}`;
            const signature = crypto.sign("RSA-SHA256", Buffer.from(unsigned), privateKey).toString("base64url");
            const jwt = `${unsigned}.${signature}`;

            const headers = {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${jwt}`,
              "X-GitHub-Api-Version": "2022-11-28",
            };

            const installationResponse = await fetch(
              `https://api.github.com/repos/${owner}/${repo}/installation`,
              { headers },
            );
            if (!installationResponse.ok) {
              throw new Error(`Failed to get installation: ${installationResponse.status} ${await installationResponse.text()}`);
            }

            const installation = await installationResponse.json();
            const tokenResponse = await fetch(
              `https://api.github.com/app/installations/${installation.id}/access_tokens`,
              {
                method: "POST",
                headers: { ...headers, "Content-Type": "application/json" },
                body: JSON.stringify({
                  repositories: [repo],
                  permissions: {
                    contents: "write",
                    pull_requests: "write",
                  },
                }),
              },
            );
            if (!tokenResponse.ok) {
              throw new Error(`Failed to create installation token: ${tokenResponse.status} ${await tokenResponse.text()}`);
            }

            const tokenPayload = await tokenResponse.json();
            console.log(`::add-mask::${tokenPayload.token}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `token=${tokenPayload.token}\n`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Checkout docs repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ env.DOCS_REPOSITORY }}
          token: ${{ steps.docs-token.outputs.token }}
          path: nodes-docs
          fetch-depth: 0

      - name: Generate source change context
        id: context
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_BASE_SHA: ${{ inputs.base_sha }}
        run: |
          set -euo pipefail
          node source/scripts/docs-bridge/generate-docs-context.mjs \
            --source-root source \
            --out "$RUNNER_TEMP/docs-context.md" \
            --metadata-out "$RUNNER_TEMP/docs-metadata.json"
          has_relevant_changes="$(node -e 'const metadata = require(process.argv[1]); process.stdout.write(String(metadata.hasRelevantChanges));' "$RUNNER_TEMP/docs-metadata.json")"
          echo "has_relevant_changes=$has_relevant_changes" >> "$GITHUB_OUTPUT"

      - name: Upload source change context
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: node-docs-context-${{ github.sha }}
          path: |
            ${{ runner.temp }}/docs-context.md
            ${{ runner.temp }}/docs-metadata.json
          if-no-files-found: error
          retention-days: 14

      - name: Generate docs changes
        if: steps.context.outputs.has_relevant_changes == 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DOCS_TARGET_PATHS: ${{ inputs.docs_target_paths }}
        run: |
          set -euo pipefail
          node source/scripts/docs-bridge/update-docs.mjs \
            --docs-root nodes-docs \
            --context "$RUNNER_TEMP/docs-context.md" \
            --metadata "$RUNNER_TEMP/docs-metadata.json" \
            --prompt source/scripts/docs-bridge/prompts/docs-update.md \
            --summary-out "$RUNNER_TEMP/docs-update-summary.md" \
            --pr-body-out "$RUNNER_TEMP/docs-pr-body.md"

      - name: Validate docs changes
        if: steps.context.outputs.has_relevant_changes == 'true'
        working-directory: nodes-docs
        run: |
          set -euo pipefail

          validation_summary="$RUNNER_TEMP/validation-summary.md"
          echo "## Validation" > "$validation_summary"

          run_check() {
            local label="$1"
            shift
            echo "Running $label"
            if "$@"; then
              echo "- ${label}: passed" >> "$validation_summary"
            else
              echo "- ${label}: failed" >> "$validation_summary"
              return 1
            fi
          }

          run_check "git diff --check" git diff --check

          if [[ -f package.json ]]; then
            if [[ -f pnpm-lock.yaml ]]; then
              corepack enable
              run_check "pnpm install" pnpm install --frozen-lockfile
              package_runner=(pnpm run)
            elif [[ -f yarn.lock ]]; then
              corepack enable
              run_check "yarn install" yarn install --immutable
              package_runner=(yarn)
            elif [[ -f package-lock.json ]]; then
              run_check "npm ci" npm ci
              package_runner=(npm run)
            else
              run_check "npm install" npm install --no-package-lock
              package_runner=(npm run)
            fi

            scripts="$(node -e "const pkg = require('./package.json'); console.log(Object.keys(pkg.scripts || {}).join(' '));")"
            for script in lint typecheck build; do
              if [[ " $scripts " == *" $script "* ]]; then
                run_check "$script" "${package_runner[@]}" "$script"
              else
                echo "- ${script}: skipped; no package script" >> "$validation_summary"
              fi
            done
          else
            echo "- package validation: skipped; package.json not found" >> "$validation_summary"
          fi

          git status --porcelain

      - name: Open docs pull request
        if: steps.context.outputs.has_relevant_changes == 'true'
        working-directory: nodes-docs
        env:
          GH_TOKEN: ${{ steps.docs-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No docs changes were generated."
            exit 0
          fi

          while IFS= read -r line; do
            file="${line:3}"
            case "$file" in
              .env|.env.*|*.pem|*.key|.github/workflows/*|node_modules/*)
                echo "Refusing to open a docs PR with generated changes to protected path: $file" >&2
                exit 1
                ;;
              package-lock.json|pnpm-lock.yaml|yarn.lock)
                if ! git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
                  echo "Refusing to open a docs PR with a newly generated lockfile: $file" >&2
                  exit 1
                fi
                ;;
            esac
          done < <(git status --porcelain)

          short_sha="${GITHUB_SHA::12}"
          branch="automation/node-docs/${short_sha}"
          title="Update node docs for ${short_sha}"
          default_branch="$(gh repo view "$DOCS_REPOSITORY" --json defaultBranchRef --jq '.defaultBranchRef.name')"

          {
            cat "$RUNNER_TEMP/docs-pr-body.md"
            echo
            cat "$RUNNER_TEMP/validation-summary.md"
          } > "$RUNNER_TEMP/final-docs-pr-body.md"

          git switch -c "$branch"
          git add -A
          git -c user.name="node-docs-bot" \
            -c user.email="node-docs-bot@users.noreply.github.com" \
            commit -m "$title"
          git push --set-upstream origin "$branch" --force-with-lease

          existing_pr="$(gh pr list \
            --repo "$DOCS_REPOSITORY" \
            --head "$branch" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" \
              --repo "$DOCS_REPOSITORY" \
              --title "$title" \
              --body-file "$RUNNER_TEMP/final-docs-pr-body.md"
            pr_ref="$existing_pr"
          else
            pr_url="$(gh pr create \
              --repo "$DOCS_REPOSITORY" \
              --head "$branch" \
              --base "$default_branch" \
              --title "$title" \
              --body-file "$RUNNER_TEMP/final-docs-pr-body.md")"
            pr_ref="$pr_url"
          fi

          gh pr edit "$pr_ref" \
            --repo "$DOCS_REPOSITORY" \
            --add-label "automated,docs,node-sync" || true
