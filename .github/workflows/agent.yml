name: Docs Agent

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to inspect. Defaults to the workflow run's SHA."
        required: false
      source_repo:
        description: "Source repository in owner/name form. Defaults to this repository."
        required: false
      docs_repo:
        description: "Docs repository in owner/name form. Defaults to vars.DOCS_REPOSITORY or soheimam/nodes-docs."
        required: false

permissions:
  contents: read

env:
  SOURCE_REPO: ${{ inputs.source_repo || github.repository }}
  COMMIT_SHA: ${{ inputs.commit_sha || github.sha }}
  DOCS_REPO: ${{ inputs.docs_repo || vars.DOCS_REPOSITORY || 'soheimam/nodes-docs' }}
  ANTHROPIC_MODEL: ${{ vars.DOCS_LLM_MODEL || vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}

jobs:
  docs-agent:
    name: Draft docs PRs from source diff
    runs-on: ubuntu-latest
    environment: DOCS_REPO_TOKEN
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout source repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: source
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install runner-only dependencies
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/agent-deps"
          npm install --prefix "$RUNNER_TEMP/agent-deps" --no-save --no-audit --no-fund js-yaml@4.1.0
          echo "NODE_PATH=$RUNNER_TEMP/agent-deps/node_modules" >> "$GITHUB_ENV"

      - name: Create docs repository token
        id: docs-token
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          DOCS_APP_ID: ${{ secrets.DOCS_APP_ID }}
          DOCS_APP_PRIVATE_KEY: ${{ secrets.DOCS_APP_PRIVATE_KEY }}
          DOCS_REPOSITORY: ${{ env.DOCS_REPO }}
        run: |
          set -euo pipefail

          if [[ -n "${DOCS_REPO_TOKEN:-}" ]]; then
            echo "::add-mask::$DOCS_REPO_TOKEN"
            echo "token=$DOCS_REPO_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${DOCS_APP_ID:-}" || -z "${DOCS_APP_PRIVATE_KEY:-}" ]]; then
            echo "Configure either DOCS_REPO_TOKEN or DOCS_APP_ID and DOCS_APP_PRIVATE_KEY." >&2
            exit 1
          fi

          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");

          async function main() {
            const appId = process.env.DOCS_APP_ID;
            const privateKey = process.env.DOCS_APP_PRIVATE_KEY.replace(/\\n/g, "\n");
            const [owner, repo] = process.env.DOCS_REPOSITORY.split("/");
            const now = Math.floor(Date.now() / 1000);

            const encode = (value) => Buffer.from(JSON.stringify(value)).toString("base64url");
            const unsigned = `${encode({ alg: "RS256", typ: "JWT" })}.${encode({
              iat: now - 60,
              exp: now + 540,
              iss: appId,
            })}`;
            const signature = crypto.sign("RSA-SHA256", Buffer.from(unsigned), privateKey).toString("base64url");
            const jwt = `${unsigned}.${signature}`;

            const headers = {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${jwt}`,
              "X-GitHub-Api-Version": "2022-11-28",
            };

            const installationResponse = await fetch(
              `https://api.github.com/repos/${owner}/${repo}/installation`,
              { headers },
            );
            if (!installationResponse.ok) {
              throw new Error(`Failed to get installation: ${installationResponse.status} ${await installationResponse.text()}`);
            }

            const installation = await installationResponse.json();
            const tokenResponse = await fetch(
              `https://api.github.com/app/installations/${installation.id}/access_tokens`,
              {
                method: "POST",
                headers: { ...headers, "Content-Type": "application/json" },
                body: JSON.stringify({
                  repositories: [repo],
                  permissions: {
                    contents: "write",
                    pull_requests: "write",
                  },
                }),
              },
            );
            if (!tokenResponse.ok) {
              throw new Error(`Failed to create installation token: ${tokenResponse.status} ${await tokenResponse.text()}`);
            }

            const tokenPayload = await tokenResponse.json();
            console.log(`::add-mask::${tokenPayload.token}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `token=${tokenPayload.token}\n`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Checkout docs repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ env.DOCS_REPO }}
          token: ${{ steps.docs-token.outputs.token }}
          path: docs-repo
          fetch-depth: 0

      - name: Run docs agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCS_REPO_TOKEN: ${{ steps.docs-token.outputs.token }}
        run: |
          set -euo pipefail
          node source/scripts/docs_agent.mjs \
            --source-root source \
            --docs-repo-root docs-repo \
            --docs-map source/docs-map.yml
